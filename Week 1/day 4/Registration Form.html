<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>
</head>
<body>

    <h1>Registration Form</h1>day

    <form>

        <label for="fullname">Full Name</label>
        <input
            type="text"
            id="fullname"
            name="fullname"
            placeholder="e.g. Raj Patil"
            required
            minlength="2"
            maxlength="50"
        >

        <br><br>

        <label for="email">Email Address</label>
        <input
            type="email"
            id="email"
            name="email"
            placeholder="raj60patil@gmail.com"
            required
        >

        <br><br>

        <label for="pwd">Password</label>
        <input
            type="password"
            id="pwd"
            name="password"
            minlength="8"
            required
        >

        <br><br>

        <label for="age">Age</label>
        <input
            type="number"
            id="age"
            name="age"
            min="18"
            max="60"
            value="21"
        >

        <br><br>

        <label for="phone">Mobile Number</label>
        <input
            type="tel"
            id="phone"
            name="phone"
            pattern="[0-9]{10}"
            placeholder="10-digit number"
        >

        <br><br>

        <label for="dob">Date of Birth</label>
        <input
            type="date"
            id="dob"
            name="dob"
            min="1990-01-01"
            max="2008-12-31"
        >

        <br><br>
        <br><br>
        <input type="reset" value="Reset">
        <input type="submit" value="Register">

    </form>

</body>
</html>
