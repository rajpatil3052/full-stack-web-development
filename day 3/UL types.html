<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>UL Types</title>
</head>
<body>

    <!-- Default: filled circle -->
    <ul type="disc">
        <li>Disc bullet item</li>
    </ul>

    <!-- Hollow circle -->
    <ul type="circle">
        <li>Circle bullet item</li>
    </ul>

    <!-- Square bullet -->
    <ul type="square">
        <li>Square bullet item</li>
    </ul>

    <!-- No bullets -->
    <ul type="none">
        <li><a href="#home">Home</a></li>
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
    </ul>

</body>
</html>
